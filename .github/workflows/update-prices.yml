name: Update Cardmarket Prices

on:
  # Täglich um 05:00 UTC
  schedule:
    - cron: "0 5 * * *"
  # Manuell auslösbar (zum Testen / bei abgelaufenen Cookies)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # für den Commit zurück ins Repo

    env:
      CARDMARKET_COOKIE: ${{ secrets.CARDMARKET_COOKIE }}
      CM_CATALOG_URL:    ${{ secrets.CM_CATALOG_URL }}
      CM_PRICEGUIDE_URL: ${{ secrets.CM_PRICEGUIDE_URL }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Läuft immer: nutzt frisch heruntergeladene Cardmarket-Dateien (wenn
      # CARDMARKET_COOKIE + CM_*_URL gesetzt sind) ODER die bereits in
      # data/raw/ liegenden Dateien (manueller Upload, Option B).
      - name: Preise & Katalog aktualisieren
        run: node scripts/update-prices.js

      - name: Daten committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Keine Änderungen zu committen."
          else
            git commit -m "chore: Cardmarket Preisupdate $(date -u '+%Y-%m-%d') [skip ci]"
            git push origin HEAD
          fi
