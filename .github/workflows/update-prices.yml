name: Update Cardmarket Prices

on:
  # Täglich um 05:00 UTC
  schedule:
    - cron: "0 5 * * *"
  # Manuell auslösbar (zum Testen / bei abgelaufenen Cookies)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # für den Commit zurück ins Repo

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preise & Katalog aktualisieren
        env:
          CARDMARKET_COOKIE: ${{ secrets.CARDMARKET_COOKIE }}
          CM_CATALOG_URL:    ${{ secrets.CM_CATALOG_URL }}
          CM_PRICEGUIDE_URL: ${{ secrets.CM_PRICEGUIDE_URL }}
        run: node scripts/update-prices.js

      - name: Änderungen prüfen
        id: check_changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Daten committen und pushen
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/latest.json data/history/
          git commit -m "chore: Cardmarket Preisupdate $(date -u '+%Y-%m-%d') [skip ci]"
          git push origin HEAD
